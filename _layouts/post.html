<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/css/blog-post.css" | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body class="site-wrapper">
    {% include nav.html %}

    <main class="container content-area reveal-card">
      <article class="post-content">
        <header class="post-header">
          <a href="{{ '/blog/' | relative_url }}" class="back-link">
            <i class="fa-solid fa-arrow-left-long"></i> Back to Blog
          </a>
          <h1 class="post-title">{{ page.title }}</h1>
          <div class="post-meta">
            <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
            {% if page.tags %}
              <span class="meta-divider">·</span>
              <span class="post-tags">
                {% for tag in page.tags %}#{{ tag }} {% endfor %}
              </span>
            {% endif %}
          </div>
        </header>

        <div class="post-body">
          {{ content }}
        </div>
      </article>
    </main>

    {% include footer.html %}
  </body>
</html>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
