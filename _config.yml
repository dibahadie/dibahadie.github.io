title: "Diba Hadi Esfangereh"
description: "Research, publications, projects, and writing."
url: "https://dibahadie.github.io"
baseurl: ""

markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

timezone: Europe/Istanbul

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "Diba Hadi Esfangereh"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - node_modules
